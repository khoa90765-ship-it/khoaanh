<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset="UTF-8">
		<link rel="stylesheet" href="../css/style2.css">
		<title>Trang đăng ký</title>
	</head>
	
	<body>
		<div class="container">
			<form id="formLogin">
				<h2 id="title">Sign up</h2>
				<div class="box">
					<label for="txtEmail">Email: </label>
					<input type="Email" id="txtEmail" name= "txtEmail" class ="form-control" placeholder="Email">
				</div>
				
				<div class="box">
					<label for="txtUsername">Username: </label>
					<input type="text" id="txtUsername" name= "txtUsername" class ="form-control" placeholder="Username">
				</div>
				
				<div class="box">
					<label for="txtPass">Password: </label>
					<input type="Password" id="txtPass" name= "userPass" class ="form-control"  placeholder="Password">
				</div>
				
				<div class="box">
					<label for="txtPass">Confirm Password: </label>
					<input type="Password" id="txtCPass" name= "userCPass" class ="form-control"  placeholder="Confirm Password">
				</div>
			
				<a href="page2.html">Sign in</a>
				<input type="submit" name ="sbLogin" value="Sign up" class="button">
				<input type="reset" name ="rsCancel" value="Cancel" class="button">
				
			</form>
	
		</div>
	
	</body>
	
	
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/hoadon.css">
    <title>Trang cá nhân</title>

    <style>
        
    </style>
</head>
<body>
    <div class="div1">

   <table id="bang1">
        <caption>Hóa đơn bán hàng</caption>
        <tr>
            <th>STT</th>
            <th>Tên hàng</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Đvt</th>
            <th>Thành tiền</th>
        </tr>
        <tr>
            <td>1</td>
            <td>A</td>
            <td class="soluong">5</td>
            <td class="dongia">50</td>
            <td>Thùng</td>
            <td class="thanhtien">?</td>
        </tr>
        <tr>
            <td>2</td>
            <td>B</td>
            <td class="soluong">4</td>
            <td class="dongia">10</td>
            <td>Cái</td>
            <td class="thanhtien">?</td>
        </tr>
        <tr>
            <td>3</td>
            <td>C</td>
            <td class="soluong">15</td>
            <td class="dongia">30</td>
            <td>Thùng</td>
            <td class="thanhtien">?</td>
        </tr>
        <tr>
            <td colspan="4">Tổng thanh toán</td>
            <td colspan="2" id="tongthanhtoan">?</td>
        </tr>

        <script>
            const sl = document.getElementsByClassName("soluong");
            const dg = document.getElementsByClassName("dongia");
            const tt = document.getElementsByClassName("thanhtien");
            let tong=0;
            
            for(let i=0;i<sl.length;i++)
            {
                tt[i].innerHTML = Number(sl[i].innerHTML) * Number(dg[i].innerHTML);
                 
                tong += Number(tt[i].innerHTML);
            }   

            document.getElementById("tongthanhtoan").innerHTML = tong;
        </script>
   </table>
    


</div>

</body>
</html>

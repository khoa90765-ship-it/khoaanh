<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Chi tiết địa điểm</title>
    <link rel="stylesheet" href="../css/trang 2.css">
</head>
<body>
  <a href="../chitiet.html" style="display: inline-block; margin: 20px 0 10px 20px; color: #007bff; text-decoration: none; font-weight: bold;">← Quay lại danh sách</a>

    <div class="container" id="container" style="display: flex; gap: 40px; align-items: flex-start; max-width: 900px; margin: 20px auto; padding: 20px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 10px;">
        
        <div class="chi-tiet-trai">
            <img src="" alt="" id="image" style="max-width: 100%; width: 350px; display: block; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        </div>
        
        <div class="chi-tiet-phai" style="flex: 1;">
            <h2 id="name" style="color: #dc3545; margin-top: 0; font-size: 28px; border-bottom: 2px solid #f8f9fa; padding-bottom: 10px;"></h2>
            <p id="price" style="font-weight: bold; color: red; font-size: 22px; margin: 15px 0;"></p>
            <p id="description" style="line-height: 1.6; color: #495057; font-size: 16px;"></p>
        </div>

    </div>

    <script>
        
        // 2. Mảng dữ liệu đồng bộ
        const Products = [
         {
        nameProduct: "nam việt quốc",
        price: "45.000vnđ",
        description: "đây là một loại nước chuyền thống tại cuba",
        image: "../assets/images/nuoc1.jpg",
        link: "chitiet.html"
    },
    {
        nameProduct: "cacao đầm",
        price: "45.000vnđ",
        description: "một loại nước uống giải khác vào mùa hè",
        image: "../assets/nuoc2.jpg", 
        link: "chitiet.html"
    },
    {
        nameProduct: "không biết tên",
        price: "30.000vnđ",
        description: "đây là nước uống giải khác vào mùa hè",
        image: "../assets/nuoc3.jpg",
        link: "chitiet.html"
    },
    {
        nameProduct: "chó cỏ",
        price: "30.000vnđ",
        description: "đây là nước uống giải khác vào mùa hè",
        image: "../assets/nuoc4.jpg",
        link: "chitiet.html"
    },
        ];

        // 3. Lấy ID từ URL (?masp=1 hoặc ?masp=2)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('masp');

        // 4. Tìm kiếm trong mảng dựa vào ID (Dùng == để tránh lệch kiểu dữ liệu)
        const foundProduct = Products.find(obj => obj.id == productId);

        // 5. Hiển thị dữ liệu ra các thẻ HTML tương ứng
        if (foundProduct) {
            document.getElementById('name').innerText = foundProduct.nameProducts;
            document.getElementById('price').innerText = foundProduct.price + "đ";
            document.getElementById('description').innerText = foundProduct.description;
            document.getElementById('image').src = foundProduct.image;
            document.getElementById('image').alt = foundProduct.nameProducts;
        } else {
            // Hiển thị thông báo nếu bạn cố tình mở file chitiet.html trực tiếp mà không truyền ID lên URL
     
            document.getElementById("container").innerHTML = `<h2>sản phẩm đã hết!</h2><a href="index.html">Quay lại trang danh sách</a>`;
        }
    </script>
</body>
</html>
